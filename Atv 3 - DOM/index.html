<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DOM: Página Interativa com JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>DOM: Página Interativa com JavaScript</h1>

  <button id="btnIncrementar">Incrementar</button>
  <button id="btnDecrementar">Decrementar</button>

  <div id="numero">0</div>

  <input type="text" id="texto" placeholder="Digite algo...">
  <p id="contadorCaracteres">0 caracteres</p>

  <div>
    <p>Ranyelson</p>
    <p>Miriam</p>
    <p>Emanuelle</p>
    <p>Casa</p>
  </div>

  <div>
    <label>Escolha o tipo de lista:</label>
    <select id="tipoLista">
      <option value="ul">Lista Não Ordenada</option>
      <option value="ol">Lista Ordenada</option>
    </select>

    <button id="btnCriarLista">Adicionar Lista</button>

    <div id="resultadoLista"></div>
  </div>

  <button id="btnResetar">Resetar Tudo</button>

  <script src="script.js"></script>

</body>
</html>
